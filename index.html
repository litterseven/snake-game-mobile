<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>贪吃蛇</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #111827, #1f2937);
      font-family: "Microsoft YaHei", sans-serif;
      color: #fff;
    }
    .wrap {
      width: min(92vw, 520px);
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }
    .panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
    }
    .tips {
      margin: 10px 0 14px;
      font-size: 14px;
      color: #d1d5db;
    }
    canvas {
      width: 100%;
      max-width: 520px;
      aspect-ratio: 1 / 1;
      background: #0b1220;
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    }
    button {
      border: none;
      padding: 10px 16px;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #16a34a; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>贪吃蛇</h1>
    <div class="panel">
      <div>分数：<span id="score">0</span></div>
      <button id="restart">重新开始</button>
    </div>
    <canvas id="game" width="520" height="520"></canvas>
    <div class="tips">方向键 / WASD 控制，空格暂停</div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const restartBtn = document.getElementById('restart');

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let snake, direction, nextDirection, food, score, gameOver, paused, speed, loop;

    function initGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      food = spawnFood();
      score = 0;
      gameOver = false;
      paused = false;
      speed = 120;
      scoreEl.textContent = score;

      if (loop) clearInterval(loop);
      loop = setInterval(update, speed);
      draw();
    }

    function spawnFood() {
      let newFood;
      do {
        newFood = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
      } while (snake && snake.some(part => part.x === newFood.x && part.y === newFood.y));
      return newFood;
    }

    function update() {
      if (gameOver || paused) {
        draw();
        return;
      }

      direction = nextDirection;
      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      const hitWall = head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount;
      const hitSelf = snake.some(part => part.x === head.x && part.y === head.y);

      if (hitWall || hitSelf) {
        gameOver = true;
        draw();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;
        food = spawnFood();

        if (speed > 60) {
          speed -= 4;
          clearInterval(loop);
          loop = setInterval(update, speed);
        }
      } else {
        snake.pop();
      }

      draw();
    }

    function drawBoard() {
      ctx.fillStyle = '#0b1220';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let x = 0; x < tileCount; x++) {
        for (let y = 0; y < tileCount; y++) {
          ctx.fillStyle = (x + y) % 2 === 0 ? '#0f172a' : '#111827';
          ctx.fillRect(x * gridSize, y * gridSize, gridSize - 1, gridSize - 1);
        }
      }
    }

    function drawSnake() {
      snake.forEach((part, index) => {
        ctx.fillStyle = index === 0 ? '#22c55e' : '#4ade80';
        ctx.beginPath();
        ctx.roundRect(part.x * gridSize + 1, part.y * gridSize + 1, gridSize - 3, gridSize - 3, 6);
        ctx.fill();
      });
    }

    function drawFood() {
      ctx.fillStyle = '#ef4444';
      ctx.beginPath();
      ctx.arc(
        food.x * gridSize + gridSize / 2,
        food.y * gridSize + gridSize / 2,
        gridSize / 2.6,
        0,
        Math.PI * 2
      );
      ctx.fill();
    }

    function drawOverlay(text, subText = '') {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 36px Microsoft YaHei';
      ctx.textAlign = 'center';
      ctx.fillText(text, canvas.width / 2, canvas.height / 2 - 10);
      if (subText) {
        ctx.font = '16px Microsoft YaHei';
        ctx.fillStyle = '#d1d5db';
        ctx.fillText(subText, canvas.width / 2, canvas.height / 2 + 24);
      }
    }

    function draw() {
      drawBoard();
      drawFood();
      drawSnake();

      if (paused && !gameOver) drawOverlay('已暂停', '按空格继续');
      if (gameOver) drawOverlay('游戏结束', '点重新开始，再战一局');
    }

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (key === ' ' || e.code === 'Space') {
        if (!gameOver) paused = !paused;
        draw();
        return;
      }

      if ((key === 'arrowup' || key === 'w') && direction.y !== 1) nextDirection = { x: 0, y: -1 };
      if ((key === 'arrowdown' || key === 's') && direction.y !== -1) nextDirection = { x: 0, y: 1 };
      if ((key === 'arrowleft' || key === 'a') && direction.x !== 1) nextDirection = { x: -1, y: 0 };
      if ((key === 'arrowright' || key === 'd') && direction.x !== -1) nextDirection = { x: 1, y: 0 };
    });

    restartBtn.addEventListener('click', initGame);

    initGame();
  </script>
</body>
</html>
